id: no-int-layout-decl
language: cpp
severity: warning
message: >-
  `int $X = $OBJ->$FIELD` where `$FIELD` is a known float layout dimension —
  the assignment silently truncates. Use `float` (preferred) or add an explicit
  `(int)` cast with a `// INT_CAST_OK: <reason>` marker if the truncation is
  intentional. Mark an audited exception with `// INT_LAYOUT_OK: <reason>`.
  This is the pattern-only sibling of `no-int-cast-radiant`; a fully precise
  type-aware version will need clang-tidy.
metadata:
  suppress: INT_LAYOUT_OK
constraints:
  F:
    # Known float layout-dimension fields. Add new ones as needed; the list is
    # intentionally narrow so the rule stays low-false-positive.
    regex: "^(x|y|width|height|content_width|content_height|advance|ascent|descent|em|baseline|line_height|font_size|padding|margin|border|gap|column_gap|row_gap|offset_x|offset_y|main_size|cross_size|flex_basis|min_width|min_height|max_width|max_height|inner_width|inner_height|line_advance|h_scroll_position|v_scroll_position|h_max_scroll|v_max_scroll)$"
rule:
  any:
    - pattern: int $X = $OBJ->$F
    - pattern: int $X = $OBJ.$F
files:
  # Layout-only scope (the no-int-cast-radiant scope minus a few that don't
  # carry float layout dimensions). Surface/pixel-buffer code (render_*.cpp,
  # tile_pool.cpp, display_list_*.cpp) is intentionally excluded — `int width =
  # surface->width` is correct there because the backing buffer IS integer
  # pixels.
  - "radiant/{layout_block,layout_inline,layout_text,layout_positioned}.cpp"
  - "radiant/{layout_flex,layout_flex_multipass,layout_flex_measurement}.cpp"
  - "radiant/{layout_table,layout_multicol,layout_grid,layout_grid_multipass}.cpp"
  - "radiant/{layout_form,layout_list,layout_counters}.cpp"
  - "radiant/{grid_sizing,grid_positioning,grid_utils,intrinsic_sizing}.cpp"
