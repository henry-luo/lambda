id: no-item-high-tag-literal
language: cpp
severity: error
message: >-
  Item high-byte literal is in double-discriminator space. Define Item
  sentinels through lambda/lambda.h constants and keep high-byte bits 6 and 5
  clear; mark audited non-Item bit masks with "// ITEM_TAG_LITERAL_OK: <reason>".
metadata:
  suppress: ITEM_TAG_LITERAL_OK
rule:
  kind: number_literal
  regex: '^0x([2-7][0-9A-Fa-f]|[A-Fa-f][0-9A-Fa-f])[0-9A-Fa-f]{14}(U?LL|ULL|ull|uLL|ULL)?$'
files:
  - "lambda/lambda.h"
  - "lambda/lambda.hpp"
  - "lambda/js/js_runtime.h"
  - "lambda/vmap.cpp"
  - "lib/lambda_typed.hpp"
  - "lib/gc/gc_heap.c"
  - "test/test_item_repr_gtest.cpp"
ignores:
  - "**/tree-sitter*/**"
