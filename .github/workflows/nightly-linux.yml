name: Nightly Linux Build & Test

on:
  schedule:
    # 3:00 PM Singapore Time (SGT = UTC+8) = 07:00 UTC
    - cron: '0 7 * * *'
  workflow_dispatch:  # Allow manual trigger

env:
  DOCKER_IMAGE: lambda-linux-ci

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('.github/workflows/Dockerfile.linux', 'setup-linux-deps.sh') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Docker image
        run: |
          docker buildx build \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            --load \
            -t $DOCKER_IMAGE \
            -f .github/workflows/Dockerfile.linux .

      - name: Run build and tests
        id: test
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/lambda \
            -w /lambda \
            $DOCKER_IMAGE \
            bash .github/workflows/run-tests-linux.sh

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-test-results
          path: |
            log.txt
            test_output.txt
          retention-days: 30
          if-no-files-found: ignore

      - name: Rotate Docker cache
        if: always()
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache || true

      # --- Notifications ---

      - name: Prepare notification
        if: always()
        run: |
          source .github/workflows/notify.sh
          if [ "${{ steps.test.outcome }}" = "success" ]; then
            EXIT_CODE=0
          else
            EXIT_CODE=1
          fi
          touch test_output.txt 2>/dev/null || true
          format_notification "Linux" "$EXIT_CODE" "test_output.txt"
          echo "NOTIFICATION<<EOF" >> $GITHUB_ENV
          echo "$NOTIFICATION_MSG" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Send Telegram notification
        if: always() && vars.TELEGRAM_ENABLED == 'true'
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ${{ env.NOTIFICATION }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Send email notification
        if: failure() && vars.EMAIL_ENABLED == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Lambda Nightly FAILED — Linux (#${{ github.run_number }})"
          to: ${{ secrets.MAIL_TO }}
          from: Lambda CI <${{ secrets.MAIL_USERNAME }}>
          body: |
            ${{ env.NOTIFICATION }}

            Full run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
