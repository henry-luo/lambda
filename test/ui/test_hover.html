<!DOCTYPE html>
<html>
<head>
<style>
body { margin: 20px; font-family: sans-serif; font-size: 16px; }
.box { width: 200px; height: 100px; border: 2px solid #333; margin: 10px; padding: 10px; }
.box:hover { background-color: #e0e0ff; border-color: blue; }
#box1 { background: #f0f0f0; }
#box2 { background: #fff0f0; }
#box3 { background: #f0fff0; }
</style>
</head>
<body>
<h1>Hover Test</h1>
<div id="box1" class="box">Hover over Box 1</div>
<div id="box2" class="box">Hover over Box 2</div>
<div id="box3" class="box">Hover over Box 3</div>
</body>
</html>
