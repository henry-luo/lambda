<!DOCTYPE html>
<html>
<head>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: sans-serif;
    font-size: 16px;
  }
  .toolbar {
    position: sticky;
    top: 0;
    padding: 12px;
    background: rgb(248, 248, 248);
    border-bottom: 1px solid rgb(180, 180, 180);
  }
  #hover-target {
    display: inline-block;
    padding: 8px 12px;
    border: 2px solid rgb(90, 90, 90);
    background: rgb(238, 238, 238);
  }
  #hover-target:hover {
    background: rgb(120, 180, 240);
  }
  #name {
    margin-left: 16px;
    padding: 6px;
    border: 2px solid rgb(110, 110, 110);
  }
  #name:focus {
    border-color: rgb(20, 120, 220);
  }
  #agree {
    margin-left: 16px;
  }
  #agree:checked + label {
    color: rgb(0, 120, 0);
    font-weight: 700;
  }
  #enabled-btn:enabled {
    color: rgb(0, 90, 180);
  }
  #disabled-btn:disabled {
    color: rgb(150, 150, 150);
  }
  .spacer {
    height: 360px;
    padding: 24px;
    border-top: 1px solid rgb(220, 220, 220);
  }
</style>
</head>
<body>
  <div class="toolbar">
    <button id="hover-target">Hover target</button>
    <input id="name" type="text" value="seed">
    <input id="agree" type="checkbox"><label for="agree">StateStore checkbox</label>
    <button id="enabled-btn">Enabled default</button>
    <button id="disabled-btn" disabled>Disabled default</button>
  </div>
  <div class="spacer" id="section-1">Section one</div>
  <div class="spacer" id="section-2">Section two</div>
  <div class="spacer" id="section-3">Section three</div>
  <div class="spacer" id="section-4">Section four</div>
</body>
</html>
