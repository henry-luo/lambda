<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>DOM mutation innerHTML parent retains child prunes</title>
<style>
  body { font-family: sans-serif; margin: 24px; }
  #host {
    width: 280px;
    height: 90px;
    overflow: auto;
    border: 2px solid #333;
    padding: 8px;
  }
  .spacer { height: 70px; }
  #victim { display: block; margin: 8px 0; }
  #replace { margin-top: 14px; }
</style>
</head>
<body>
  <div id="host">
    <div class="spacer">top</div>
    <input id="victim" value="victim">
    <div class="spacer">bottom</div>
  </div>
  <button id="replace">Replace children</button>
  <p id="status">waiting</p>
  <script>
    const host = document.getElementById('host');
    const replace = document.getElementById('replace');

    replace.addEventListener('click', () => {
      host.innerHTML = '<div id="replacement">replacement child</div><div class="spacer">new bottom</div>';
    });
  </script>
</body>
</html>
