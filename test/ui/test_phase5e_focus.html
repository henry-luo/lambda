<!DOCTYPE html>
<html>
<head>
<style>
body { margin: 0; padding: 20px; font-family: sans-serif; }
input, button, select, textarea, a { display: block; margin: 10px 0; padding: 5px; }
input:focus, button:focus, select:focus, textarea:focus, a:focus { outline: 2px solid blue; }
</style>
</head>
<body>
<input id="name" type="text" placeholder="Name">
<input id="email" type="email" placeholder="Email">
<button id="btn">Submit</button>
<select id="sel"><option>A</option><option>B</option></select>
<textarea id="ta" rows="2">Notes</textarea>
<a id="link" href="#">Help</a>
</body>
</html>
