<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Iframe Textarea Inner Fixture</title>
    <style>
        body { margin: 0; padding: 8px; font-family: Arial, sans-serif; font-size: 14px; }
        .row { margin-bottom: 8px; }
        input[type="text"], textarea, select { width: 220px; font-size: 16px; }
        textarea { height: 48px; }
    </style>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('js-btn').addEventListener('click', () => {
                document.getElementById('status').textContent = 'clicked';
            });
        });
    </script>
</head>
<body>
    <div class="row"><input id="agree" type="checkbox"> Agree</div>
    <div class="row"><input id="choice" name="choice" type="radio"> Choice</div>
    <div class="row"><input id="name" type="text" value=""></div>
    <div class="row">
        <select id="color">
            <option>Red</option>
            <option>Green</option>
        </select>
    </div>
    <div class="row"><textarea id="bio">abc</textarea></div>
    <button id="js-btn">JS Button</button>
    <div id="status">idle</div>
</body>
</html>
