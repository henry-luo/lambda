<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>DOM mutation textContent incremental</title>
<style>
  body { font-family: sans-serif; margin: 24px; }
  #target {
    border: 2px solid #444;
    margin-top: 16px;
    padding: 8px;
    width: 260px;
  }
  #old-child { display: block; margin: 4px 0; }
</style>
</head>
<body>
  <input id="name" value="ready">
  <button id="replace">Replace text</button>
  <div id="target"><span id="old-child">old child</span></div>
  <script>
    const nameField = document.getElementById('name');
    const replace = document.getElementById('replace');
    const target = document.getElementById('target');

    replace.addEventListener('click', () => {
      target.textContent = 'replacement text';
    });

    nameField.addEventListener('keydown', () => {
      target.textContent = 'replacement from key';
    });
  </script>
</body>
</html>
