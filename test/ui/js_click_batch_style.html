<!DOCTYPE html>
<html>
<head>
<title>JS Click: getElementsByTagName batch update</title>
<style>
  body { margin: 20px; font-family: serif; font-size: 16px; }
  .box { width: 80px; height: 30px; margin: 5px; padding: 5px; display: inline-block; background: #ddd; }
</style>
<script>
  function setFontFamily() {
    var divs = document.getElementsByTagName('div');
    for (var i = 0; i < divs.length; i++) {
      divs[i].style.fontFamily = 'monospace';
    }
  }
  function resetFont() {
    var divs = document.getElementsByTagName('div');
    for (var i = 0; i < divs.length; i++) {
      divs[i].style.fontFamily = 'serif';
    }
  }
</script>
</head>
<body>
  <button id="btn-mono" onclick="setFontFamily()">Set Monospace</button>
  <button id="btn-reset" onclick="resetFont()">Reset Font</button>
  <div class="box" id="box1">Box 1</div>
  <div class="box" id="box2">Box 2</div>
  <div class="box" id="box3">Box 3</div>
</body>
</html>
