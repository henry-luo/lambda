<!DOCTYPE html>
<html>
<head>
<title>JS Mousedown: press handler</title>
<style>
  body { margin: 20px; font-family: sans-serif; font-size: 16px; }
  #press-area { width: 200px; height: 100px; background: #ccc; padding: 10px; cursor: pointer; }
  #press-area.pressed { background: #666; color: white; }
  #counter { margin-top: 10px; font-size: 20px; }
</style>
<script>
  var pressCount = 0;
  function onPress() {
    pressCount++;
    document.getElementById('press-area').className = 'pressed';
    document.getElementById('counter').textContent = 'Presses: ' + pressCount;
  }
</script>
</head>
<body>
  <div id="press-area" class="" onmousedown="onPress()">Press me</div>
  <div id="counter">Presses: 0</div>
</body>
</html>
