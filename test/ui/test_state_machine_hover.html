<!DOCTYPE html>
<html>
<head>
<style>
  body { margin: 20px; font-family: sans-serif; font-size: 16px; }
  #outer { padding: 18px; border: 2px solid rgb(80, 80, 80); }
  #inner { padding: 14px; border: 2px solid rgb(120, 120, 120); }
  #target, #sibling, #outside {
    display: inline-block;
    padding: 10px 14px;
    margin: 6px;
    border: 2px solid rgb(90, 90, 90);
    background: rgb(238, 238, 238);
  }
  #target:hover, #sibling:hover, #outside:hover { background: rgb(120, 180, 240); }
</style>
</head>
<body>
  <div id="outer">
    <div id="inner">
      <button id="target">Target</button>
    </div>
    <button id="sibling">Sibling</button>
  </div>
  <button id="outside">Outside</button>
</body>
</html>
