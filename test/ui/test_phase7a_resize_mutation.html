<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: sans-serif; font-size: 16px; }
  #container {
    width: 80%;
    margin: 20px auto;
    background-color: rgb(240, 240, 240);
    padding: 20px;
  }
  #header {
    background-color: rgb(50, 100, 200);
    color: rgb(255, 255, 255);
    padding: 15px;
    text-align: center;
    font-size: 24px;
  }
  .col {
    width: 50%;
    float: left;
    padding: 10px;
    min-height: 100px;
  }
  .col-left { background-color: rgb(200, 220, 240); }
  .col-right { background-color: rgb(220, 240, 200); }
  #footer {
    clear: both;
    background-color: rgb(100, 100, 100);
    color: rgb(255, 255, 255);
    padding: 10px;
    text-align: center;
  }
</style>
</head>
<body>
  <div id="container">
    <div id="header">Resize Test</div>
    <div class="col col-left">Left Column</div>
    <div class="col col-right">Right Column</div>
    <div id="footer">Footer</div>
  </div>
</body>
</html>
