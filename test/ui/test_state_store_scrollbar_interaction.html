<!DOCTYPE html>
<html>
<head>

<title>StateStore scrollbar interaction</title>
<style>
body { margin: 24px; font-family: sans-serif; }

  width: 220px;
  height: 160px;
  overflow: scroll;

  width: 620px;
  height: 680px;
  background: linear-gradient(#eef, #efe);

</head>

</body>
</html>
