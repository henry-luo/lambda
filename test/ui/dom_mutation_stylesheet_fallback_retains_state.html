<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>DOM mutation stylesheet fallback retains state</title>
<style id="theme-style">
  body { font-family: sans-serif; margin: 24px; }
  #name { width: 220px; padding: 8px; border: 2px solid #333; }
  #status { margin-top: 12px; color: rgb(20, 90, 160); }
</style>
</head>
<body>
  <label for="name">Name</label>
  <input id="name" value="ready">
  <p id="status">waiting</p>
  <script>
    const input = document.getElementById('name');
    const style = document.getElementById('theme-style');
    const status = document.getElementById('status');
    let mutated = false;

    input.addEventListener('keydown', () => {
      if (mutated) return;
      mutated = true;
      style.setAttribute('data-recascade', 'yes');
      status.textContent = 'style mutation complete';
    });
  </script>
</body>
</html>
