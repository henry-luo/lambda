<!DOCTYPE html>
<html>
<head>
<title>Hit-test stacking order</title>
<style>
  body {
    margin: 0;
    font-family: sans-serif;
    font-size: 16px;
  }
  #stage {
    position: relative;
    margin: 20px;
    width: 260px;
    height: 180px;
    background: #f4f4f4;
  }
  .layer {
    position: absolute;
    width: 140px;
    height: 90px;
    color: white;
    line-height: 90px;
    text-align: center;
  }
  #low {
    left: 40px;
    top: 40px;
    z-index: 1;
    background: #9b2f2f;
  }
  #high {
    left: 70px;
    top: 65px;
    z-index: 10;
    background: #247a42;
  }
  #status {
    margin: 12px 20px;
  }
</style>
<script>
function mark(value) {
  document.getElementById('status').textContent = value;
}
</script>
</head>
<body>
  <div id="stage">
    <div id="low" class="layer" onclick="mark('low')">low</div>
    <div id="high" class="layer" onclick="mark('high')">high</div>
  </div>
  <p id="status">none</p>
</body>
</html>
