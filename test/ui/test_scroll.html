<!DOCTYPE html>
<html>
<head>
<style>
body { margin: 20px; font-family: sans-serif; font-size: 16px; height: 3000px; }
h1 { position: fixed; top: 0; background: white; width: 100%; padding: 10px; margin: 0; z-index: 10; }
.section { margin-top: 80px; padding: 20px; }
#sec-a { margin-top: 600px; background: #f0f0ff; }
#sec-b { margin-top: 200px; background: #fff0f0; }
#sec-c { margin-top: 200px; background: #f0fff0; }
</style>
</head>
<body>
<h1>Scroll Test Page</h1>
<div class="section" id="sec-top">
  <p>Top section content. Scroll down to see more.</p>
</div>
<div class="section" id="sec-a">
  <h2>Section A</h2>
  <p>Content of Section A at offset ~600px.</p>
</div>
<div class="section" id="sec-b">
  <h2>Section B</h2>
  <p>Content in Section B.</p>
</div>
<div class="section" id="sec-c">
  <h2>Section C</h2>
  <p>Content in Section C near bottom.</p>
</div>
</body>
</html>
