<!DOCTYPE html>
<html>
<head>
<title>JS Click: inline style mutation</title>
<style>
  body { margin: 20px; font-family: sans-serif; font-size: 16px; }
  #target { width: 100px; height: 50px; background: blue; color: white; padding: 10px; box-sizing: border-box; }
</style>
<script>
  function setWidth200() {
    document.getElementById('target').style.width = '200px';
  }
  function setColorRed() {
    document.getElementById('target').style.backgroundColor = 'red';
  }
  function setBoth() {
    var el = document.getElementById('target');
    el.style.width = '300px';
    el.style.height = '100px';
  }
</script>
</head>
<body>
  <button id="btn-width" onclick="setWidth200()">Set Width 200</button>
  <button id="btn-color" onclick="setColorRed()">Set Color Red</button>
  <button id="btn-both" onclick="setBoth()">Set Both</button>
  <div id="target">Target Element</div>
</body>
</html>
