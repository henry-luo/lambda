<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>DOM mutation structural CSS risk retained full layout</title>
<style>
  body { font-family: sans-serif; margin: 24px; }
  #name { width: 220px; padding: 8px; border: 2px solid #333; }
  #items { margin-top: 16px; }
  #items .row:first-child { color: rgb(180, 40, 40); }
  .inserted { padding: 6px; }
</style>
</head>
<body>
  <label for="name">Name</label>
  <input id="name" value="ready">
  <div id="items">
    <div id="old-first" class="row">old first</div>
  </div>
  <p id="status">waiting</p>
  <script>
    const input = document.getElementById('name');
    const items = document.getElementById('items');
    const status = document.getElementById('status');
    let inserted = false;

    input.addEventListener('keydown', () => {
      if (inserted) return;
      inserted = true;
      const row = document.createElement('div');
      row.id = 'inserted-risk';
      row.className = 'row inserted';
      row.textContent = 'new first';
      items.insertBefore(row, items.firstElementChild);
      status.textContent = 'structural risk mutation complete';
    });
  </script>
</body>
</html>
