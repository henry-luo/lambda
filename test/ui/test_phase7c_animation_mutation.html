<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: sans-serif; font-size: 16px; }
  #box {
    width: 200px;
    height: 200px;
    background-color: rgb(50, 100, 200);
    margin: 50px auto;
    opacity: 1;
    transition: opacity 0.5s ease;
  }
  #label {
    text-align: center;
    padding: 20px;
    font-size: 20px;
  }
</style>
</head>
<body>
  <div id="label">Animation Test</div>
  <div id="box"></div>
</body>
</html>
