<!DOCTYPE html>
<html>
<head>
<style>
  body { margin: 20px; font-family: sans-serif; font-size: 16px; }
  #panel { padding: 18px; border: 2px solid rgb(80, 80, 80); }
  #press, #drag-src, #drop-zone {
    display: inline-block;
    padding: 12px 16px;
    margin: 8px;
    border: 2px solid rgb(90, 90, 90);
    background: rgb(238, 238, 238);
  }
  #press:active { background: rgb(240, 180, 120); }
  #drag-src { cursor: grab; }
  #drop-zone { min-width: 120px; min-height: 48px; background: rgb(230, 245, 235); }
</style>
</head>
<body>
  <div id="panel">
    <button id="press">Press me</button>
    <div id="drag-src" draggable="true" dragdata="payload">Drag source</div>
    <div id="drop-zone" dropzone="copy">Drop zone</div>
  </div>
</body>
</html>
