<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Host-loop fresh geometry</title>
  <style>
    #box { width: 40px; height: 25px; background: navy; }
  </style>
</head>
<body>
  <button id="resize-box" type="button">Resize box</button>
  <div id="box"></div>
  <p id="result">pending</p>
  <script>
    document.getElementById('resize-box').addEventListener('click', function () {
      var box = document.getElementById('box');
      box.style.width = '135px';
      box.style.height = '55px';
      var rect = box.getBoundingClientRect();
      document.getElementById('result').textContent =
        Math.round(rect.width) + 'x' + Math.round(rect.height);
    });
  </script>
</body>
</html>
