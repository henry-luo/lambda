<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    #box { width: 100px; height: 40px; opacity: 1; background: #58a; }
  </style>
</head>
<body>
  <button id="start">start tween</button>
  <div id="box">box</div>
  <script src="../../js/gsap.min.js"></script>
  <script>
    console.log('gsap-plugin-probe:' + typeof window.CSSPlugin + ':' +
      typeof window.CSSPlugin.targetTest + ':' + Object.keys(window.CSSPlugin).join(',') + ':' +
      typeof gsap.plugins.css.targetTest + ':' + Object.keys(gsap.plugins.css).join(','));
    var pluginKeys = [];
    for (var pluginKey in window.CSSPlugin) {
      pluginKeys.push(pluginKey + '=' + (pluginKey in gsap.plugins.css));
    }
    console.log('gsap-plugin-in:' + pluginKeys.join(','));
    document.getElementById('start').addEventListener('click', function () {
      gsap.to('#box', {
        opacity: 0.25,
        duration: 0.06,
        onComplete: function () { gsap.ticker.sleep(); }
      });
    });
  </script>
</body>
</html>
