<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Window scroll event</title>
  <style>
    html, body { margin: 0; }
    #page { height: 1800px; }
    #status { position: fixed; top: 0; left: 0; width: 180px; height: 24px; }
  </style>
</head>
<body>
  <div id="page"><div id="status">not-scrolled</div></div>
  <script>
    window.addEventListener('scroll', function () {
      var status = document.getElementById('status');
      status.className = 'scrolled';
      status.textContent = 'scrolled';
    });
  </script>
</body>
</html>
