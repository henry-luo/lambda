<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { margin: 40px; font: 16px sans-serif; }
    .noUi-target { position: relative; display: block; width: 300px; height: 20px; background: #ddd; }
    .noUi-base, .noUi-connects { position: relative; display: block; width: 100%; height: 100%; }
    .noUi-origin { position: absolute; display: block; width: 100%; height: 0; right: 0; top: 0; }
    .noUi-handle { position: absolute; display: block; box-sizing: border-box; width: 26px; height: 26px; right: -13px; top: -3px; background: #2878c8; }
  </style>
</head>
<body>
  <div id="slider"></div>
  <script src="../../js/nouislider.min.js"></script>
  <script>
    noUiSlider.create(document.getElementById('slider'), {
      start: 25,
      range: { min: 0, max: 100 }
    });
  </script>
</body>
</html>
