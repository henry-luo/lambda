<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Live inline style survives post-script recascade</title>
  <style>
    #target { width: 25px; height: 15px; }
    #target.recascade { width: 60px; height: 30px; }
  </style>
</head>
<body>
  <div id="target" style="width: 40px; height: 20px"></div>
  <p id="result">pending</p>
  <script>
    var target = document.getElementById('target');
    target.setAttribute('style', 'width: 83px; height: 37px');
    target.className = 'recascade';
    document.getElementById('result').textContent = target.getAttribute('style');
  </script>
</body>
</html>
