<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { margin: 24px; font: 16px sans-serif; }
    .splide { width: 320px; overflow: hidden; }
    .splide__track { width: 320px; overflow: hidden; }
    .splide__list { display: flex; margin: 0; padding: 0; }
    .splide__slide { display: block; flex: 0 0 320px; width: 320px; height: 100px; padding: 20px; box-sizing: border-box; }
  </style>
</head>
<body>
  <div id="splide" class="splide">
    <div class="splide__track"><ul class="splide__list">
      <li id="slide-one" class="splide__slide">one</li>
      <li id="slide-two" class="splide__slide">two</li>
      <li id="slide-three" class="splide__slide">three</li>
    </ul></div>
  </div>
  <script src="../../js/splide.min.js"></script>
  <script>
    new Splide('#splide', {
      arrows: false,
      pagination: false,
      speed: 0,
      drag: true
    }).mount();
  </script>
</body>
</html>
