<!DOCTYPE html>
<html>
<head>
<style>
body { margin: 0; padding: 0; }
#box { width: 100px; height: 100px; background: #e74c3c; }
#scaled { width: 100px; height: 100px; background: #2ecc71; transform: scale(2); transform-origin: top left; margin-top: 120px; }
#rotated { width: 100px; height: 100px; background: #3498db; transform: rotate(45deg); position: absolute; top: 350px; left: 20px; }
#translated { width: 80px; height: 80px; background: #f39c12; transform: translate(50px, 30px); position: absolute; top: 0; left: 300px; }
</style>
</head>
<body>
<div id="box"></div>
<div id="scaled"></div>
<div id="rotated"></div>
<div id="translated"></div>
</body>
</html>
