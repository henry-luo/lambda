<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Form Controls Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; font-size: 16px; padding: 10px; }
        h2 { margin-bottom: 8px; }
        .section { margin-bottom: 12px; }
        .section h3 { margin-bottom: 4px; font-size: 14px; color: #555; }
        .field { margin-bottom: 6px; }
        .field label { display: inline-block; width: 100px; }
        .checkbox-group label, .radio-group label { margin-right: 12px; }
        select { padding: 2px 4px; }
    </style>
</head>
<body>
    <h2>Form Controls</h2>

    <div class="section">
        <h3>Checkboxes</h3>
        <div class="checkbox-group">
            <label><input type="checkbox" id="cb-terms"> Terms</label>
            <label><input type="checkbox" id="cb-news" checked> News</label>
        </div>
    </div>

    <div class="section">
        <h3>Radio Buttons</h3>
        <div class="radio-group">
            <label><input type="radio" name="size" id="radio-sm" value="sm"> Small</label>
            <label><input type="radio" name="size" id="radio-md" value="md" checked> Medium</label>
            <label><input type="radio" name="size" id="radio-lg" value="lg"> Large</label>
        </div>
    </div>

    <div class="section">
        <h3>Select Dropdown</h3>
        <div class="field">
            <label for="color">Color:</label>
            <select id="color">
                <option value="red">Red</option>
                <option value="green">Green</option>
                <option value="blue" selected>Blue</option>
            </select>
        </div>
        <div class="field">
            <label for="country">Country:</label>
            <select id="country">
                <option value="">-- Select --</option>
                <option value="us">United States</option>
                <option value="uk">United Kingdom</option>
                <option value="de">Germany</option>
            </select>
        </div>
    </div>
</body>
</html>
