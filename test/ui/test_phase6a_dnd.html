<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: sans-serif; font-size: 16px; margin: 20px; }
  h1 { font-size: 24px; margin-bottom: 20px; }
  .container { display: flex; gap: 20px; margin-top: 20px; }
  .box {
    width: 120px; height: 80px;
    border: 2px solid #333;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  #drag-src {
    background: rgb(100, 149, 237);
    color: white;
    cursor: grab;
  }
  #drop-zone {
    background: rgb(144, 238, 144);
    border-style: dashed;
  }
  #no-drag {
    background: rgb(255, 200, 200);
  }
  .info { margin-top: 20px; font-size: 14px; color: #666; }
</style>
</head>
<body>
  <h1>Drag and Drop Test</h1>
  <div class="container">
    <div id="drag-src" class="box" draggable="true">Drag Me</div>
    <div id="drop-zone" class="box">Drop Here</div>
    <div id="no-drag" class="box" draggable="false">Not Draggable</div>
  </div>
  <p class="info" id="status">Ready</p>
</body>
</html>
