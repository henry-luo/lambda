<!DOCTYPE html>
<html>
<head>
<title>JS Multi-event: combined event types</title>
<style>
  body { margin: 20px; font-family: sans-serif; font-size: 16px; }
  #box { width: 150px; height: 80px; background: #ccc; padding: 10px; margin: 10px 0; border: 2px solid #999; }
  #box.hover { background: #ffc; }
  #box.down { background: #fcc; border-color: red; }
  #box.clicked { background: #cfc; border-color: green; }
  #log { margin-top: 10px; font-family: monospace; font-size: 14px; min-height: 20px; }
</style>
<script>
  function onBoxOver() {
    document.getElementById('box').className = 'hover';
    document.getElementById('log').textContent = 'mouseover';
  }
  function onBoxDown() {
    document.getElementById('box').className = 'down';
    document.getElementById('log').textContent = 'mousedown';
  }
  function onBoxClick() {
    document.getElementById('box').className = 'clicked';
    document.getElementById('log').textContent = 'click';
  }
</script>
</head>
<body>
  <div id="box" onmouseover="onBoxOver()" onmousedown="onBoxDown()" onclick="onBoxClick()">
    Interact with me
  </div>
  <div id="log">no event</div>
</body>
</html>
