<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: sans-serif; font-size: 16px; }
  .section {
    height: 400px;
    padding: 20px;
    border-bottom: 1px solid rgb(200, 200, 200);
  }
  #section1 { background-color: rgb(255, 230, 230); }
  #section2 { background-color: rgb(230, 255, 230); }
  #section3 { background-color: rgb(230, 230, 255); }
  #section4 { background-color: rgb(255, 255, 230); }
  #section5 { background-color: rgb(230, 255, 255); }
  h2 { margin-bottom: 10px; }
</style>
</head>
<body>
  <div id="section1" class="section"><h2>Section 1</h2><p>Content for section one</p></div>
  <div id="section2" class="section"><h2>Section 2</h2><p>Content for section two</p></div>
  <div id="section3" class="section"><h2>Section 3</h2><p>Content for section three</p></div>
  <div id="section4" class="section"><h2>Section 4</h2><p>Content for section four</p></div>
  <div id="section5" class="section"><h2>Section 5</h2><p>Content for section five</p></div>
</body>
</html>
