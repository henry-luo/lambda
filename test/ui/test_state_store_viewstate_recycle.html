<!DOCTYPE html>
<html>
<head>
<style>
  body { margin: 20px; font-family: sans-serif; font-size: 16px; }
  #victim, #remove {
    display: inline-block;
    padding: 10px 14px;
    border: 2px solid rgb(80, 80, 80);
    background: rgb(238, 238, 238);
    cursor: pointer;
  }
  #victim:hover { background: rgb(120, 180, 240); }
</style>
<script>
  function removeVictim() {
    var victim = document.getElementById('victim');
    if (victim && victim.parentNode) victim.parentNode.removeChild(victim);
    document.getElementById('status').textContent = 'removed';
  }
</script>
</head>
<body>
  <div id="victim">Remove me</div>
  <button id="remove" onclick="removeVictim()">Remove</button>
  <div id="status">present</div>
</body>
</html>
