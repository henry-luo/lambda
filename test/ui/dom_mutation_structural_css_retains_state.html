<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>DOM mutation structural CSS fallback retains state</title>
<style>
  body { font-family: sans-serif; margin: 24px; }
  #name { width: 220px; padding: 8px; border: 2px solid #333; }
  #items { margin-top: 16px; }
  .inserted { padding: 6px; color: rgb(20, 100, 50); }
</style>
</head>
<body>
  <label for="name">Name</label>
  <input id="name" value="ready">
  <div id="items">
    <div class="row">original</div>
  </div>
  <p id="status">waiting</p>
  <script>
    const input = document.getElementById('name');
    const items = document.getElementById('items');
    const status = document.getElementById('status');
    let inserted = false;

    input.addEventListener('keydown', () => {
      if (inserted) return;
      inserted = true;
      const row = document.createElement('div');
      row.id = 'inserted';
      row.className = 'inserted';
      row.textContent = 'inserted row';
      items.appendChild(row);
      status.textContent = 'structural mutation complete';
    });
  </script>
</body>
</html>
