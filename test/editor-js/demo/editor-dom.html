<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lambda Editor — plain-DOM (Stage 4B)</title>
    <style>
      :root {
        --border: #e2e8f0; --bg: #ffffff; --accent: #2563eb;
        --text: #0f172a; --muted: #64748b;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        color: var(--text); background: #eef2f7;
      }
      #root { max-width: 820px; margin: 0 auto; padding: 24px; }

      .rdt-surface {
        background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
        padding: 24px 28px; outline: none; line-height: 1.6; min-height: 220px;
        box-shadow: 0 0 24px rgba(15, 23, 42, 0.06);
      }
      .rdt-surface:focus { outline: none; }

      .rdt-editor h1 { font-size: 26px; margin: 0 0 14px; line-height: 1.25; }
      .rdt-editor h2 { font-size: 19px; margin: 22px 0 10px; }
      .rdt-editor p { margin: 0 0 12px; }
      .rdt-editor a { color: var(--accent); }
      .rdt-editor code {
        background: #f1f5f9; border-radius: 4px; padding: 1px 5px;
        font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 0.9em;
      }
      .rdt-editor blockquote {
        margin: 12px 0; padding: 4px 16px; border-left: 4px solid #cbd5e1;
        color: var(--muted); background: #f8fafc; border-radius: 0 6px 6px 0;
      }
      .rdt-editor ul, .rdt-editor ol { margin: 0 0 14px; padding-left: 26px; }
      .rdt-editor li { margin: 3px 0; }
      .rdt-editor .rdt-mention {
        display: inline-block; background: #e0e7ff; color: #3730a3;
        border-radius: 4px; padding: 0 5px; margin: 0 1px; font-weight: 500;
        white-space: nowrap; user-select: none; cursor: default;
      }
      .rdt-drawing { margin: 10px 0 18px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }

      .rdt-debug {
        margin-top: 16px; font-size: 11px; background: #f6f6f6;
        padding: 8px; border-radius: 6px; overflow: auto; color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main-dom.ts"></script>
  </body>
</html>
