<!DOCTYPE html>
<html>
<head>
    <title>DOM Mutation Test</title>
</head>
<body>
    <div id="container">
        <p id="first">First paragraph</p>
        <p id="second">Second paragraph</p>
        <p id="third">Third paragraph</p>
    </div>
    <div id="target">
        <span class="a">A</span>
        <span class="b">B</span>
        <span class="c">C</span>
    </div>
    <div id="clone-src">
        <em>Italic</em>
        <strong>Bold</strong>
    </div>
</body>
</html>
