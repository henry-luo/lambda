<!DOCTYPE html>
<html>
<head>
    <title>DOM v12b Test</title>
</head>
<body>
    <div id="main">
        <p id="para1">First</p>
        <p id="para2">Second</p>
        <p id="para3">Third</p>
    </div>
    <div id="replace-target">
        <span id="old-child">Old</span>
    </div>

        <span id="keeper">Stay</span>
    </div>

    <div id="style-target" style="color: red; font-size: 16px;"></div>
</body>
</html>
