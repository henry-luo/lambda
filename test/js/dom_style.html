<!DOCTYPE html>
<html>
<head>
    <title>DOM Style Test</title>
    <style>
        #styled { color: red; font-size: 16px; }
        .box { display: block; margin: 10px; }
    </style>
</head>
<body>
    <div id="styled" class="box" style="background-color: blue; padding: 5px;">
        Styled element
    </div>
    <div id="plain">Plain element</div>
    <div id="multi" style="width: 100px; height: 50px; border: 1px solid black;">
        Multi-style
    </div>
</body>
</html>
