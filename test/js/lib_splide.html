<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { margin: 0; }
    .splide { width: 300px; overflow: hidden; }
    .splide__track { width: 300px; overflow: hidden; }
    .splide__list { display: flex; margin: 0; padding: 0; }
    .splide__slide { display: block; flex: 0 0 300px; width: 300px; height: 80px; }
  </style>
</head>
<body>
  <div id="splide" class="splide">
    <div class="splide__track"><ul class="splide__list">
      <li class="splide__slide">one</li>
      <li class="splide__slide">two</li>
      <li class="splide__slide">three</li>
    </ul></div>
  </div>
</body>
</html>
