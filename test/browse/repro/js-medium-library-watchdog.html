<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Medium library watchdog budget</title>
</head>
<body>
  <main id="result">pending</main>
  <script>
    const tokens = [];
    for (let i = 0; i < 2200; i++) {
      tokens.push("token-" + i);
    }
    const re = /token-(\d+)/;
    let matched = 0;
    for (let i = 0; i < tokens.length; i++) {
      if (re.test(tokens[i])) matched++;
    }
    document.getElementById("result").textContent = matched === tokens.length ? "pass" : "fail";
  </script>
</body>
</html>
