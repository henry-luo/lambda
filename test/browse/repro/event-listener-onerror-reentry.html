<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Event Listener Onerror Reentry Repro</title>
</head>
<body>
  <p>listener exception reporting should not crash dispatch</p>
  <script>
    window.onerror = function () {
      throw new Error("nested onerror failure");
    };
    document.addEventListener("DOMContentLoaded", function () {
      throw new Error("listener failure");
    });
  </script>
</body>
</html>
